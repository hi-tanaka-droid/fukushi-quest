<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>福祉クエスト 〜社会福祉原論A〜</title>
<meta name="theme-color" content="#0b0e2a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="福祉クエスト">
</head>
<body>
<style>
:root{
  --ground:#0b0e2a;
  --win:#0a0f26;
  --frame:#f4f6ff;
  --gold:#ffcf4d;
  --hp:#4ade80;
  --foe:#ff5d7a;
  --cyan:#7dd8ff;
  --dim:#a3abd6;
  font-size:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ground);}
body{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  color:var(--frame);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.75;
}
.px{font-family:"ＭＳ ゴシック","MS Gothic","Osaka-Mono",monospace;}
#sky{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1px 1px at 12% 18%,#fff9 50%,transparent 51%),
    radial-gradient(1px 1px at 78% 8%,#fff7 50%,transparent 51%),
    radial-gradient(2px 2px at 33% 62%,#9fd4ff55 50%,transparent 51%),
    radial-gradient(1px 1px at 61% 41%,#fff6 50%,transparent 51%),
    radial-gradient(1px 1px at 89% 71%,#fff8 50%,transparent 51%),
    radial-gradient(2px 2px at 8% 84%,#ffd9a955 50%,transparent 51%),
    radial-gradient(1px 1px at 45% 25%,#fff5 50%,transparent 51%),
    radial-gradient(1px 1px at 70% 88%,#fff7 50%,transparent 51%),
    radial-gradient(1px 1px at 25% 95%,#fff5 50%,transparent 51%),
    radial-gradient(1px 1px at 95% 33%,#fff6 50%,transparent 51%),
    radial-gradient(ellipse 120% 60% at 50% 115%,#1b2350 0%,transparent 60%),
    linear-gradient(#070a20,#0b0e2a 40%,#0e1233);
}
#sky::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0 3px,#00000012 3px 4px);
}
#app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:14px 12px 60px;}
@supports(padding:max(0px)){
  #app{padding-top:max(14px,env(safe-area-inset-top));padding-bottom:max(60px,calc(env(safe-area-inset-bottom) + 44px));}
}
.screen{display:none;}
.screen.on{display:block;animation:fadein .25s steps(4);}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ===== RPG window ===== */
.win{
  background:var(--win);
  border:3px solid var(--frame);
  border-radius:12px;
  box-shadow:0 0 0 3px var(--win), inset 0 0 0 3px #ffffff26, 0 6px 24px #00000088;
  padding:16px 18px;
}
.win+.win{margin-top:12px;}

/* ===== title ===== */
#scr-title{text-align:center;padding-top:5vh;}
.logo-eyebrow{color:var(--cyan);font-size:.82rem;letter-spacing:.45em;margin-bottom:10px;}
.logo{
  font-size:clamp(2.7rem,9vw,4.3rem);font-weight:bold;letter-spacing:.06em;color:#fff;
  text-shadow:0 3px 0 #2a2f6b,0 6px 0 #14173d,4px 4px 0 #000,0 0 28px #7dd8ff44;
  line-height:1.25;
}
.logo .q{color:var(--gold);text-shadow:0 3px 0 #8a6a10,0 6px 0 #4d3a06,4px 4px 0 #000,0 0 30px #ffcf4d66;}
.logo-sub{color:var(--dim);margin-top:8px;font-size:.9rem;letter-spacing:.22em;}
.tagline{
  margin:24px auto 4px;color:var(--gold);font-size:1.02rem;letter-spacing:.1em;font-weight:bold;
  animation:blink 1.3s steps(2) infinite;
}
@keyframes blink{50%{opacity:.2;}}
.modes{display:flex;flex-direction:column;gap:12px;max-width:420px;margin:24px auto 0;}
.mode-btn{
  font-family:inherit;font-size:1.18rem;font-weight:bold;color:var(--frame);cursor:pointer;text-align:left;
  background:var(--win);border:3px solid var(--frame);border-radius:12px;padding:16px 22px;
  box-shadow:inset 0 0 0 3px #ffffff22,0 4px 0 #000;
  transition:transform .06s;position:relative;
}
.mode-btn small{display:block;color:var(--dim);font-size:.8rem;font-weight:normal;margin-top:3px;line-height:1.6;}
.mode-btn:hover,.mode-btn:focus-visible{color:var(--gold);transform:translateY(-2px);outline:none;border-color:var(--gold);}
.mode-btn:hover::before,.mode-btn:focus-visible::before{content:"▶";position:absolute;left:-1.15em;color:var(--gold);animation:blink 1s steps(2) infinite;}
.mode-btn:active{transform:translateY(2px);box-shadow:inset 0 0 0 3px #ffffff22,0 0 0 #000;}
.title-tools{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.records{
  max-width:420px;margin:20px auto 0;font-size:.82rem;color:var(--dim);
  display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;text-align:left;
}
.records b{color:var(--gold);font-variant-numeric:tabular-nums;}
.parade{overflow:hidden;white-space:nowrap;margin-top:26px;opacity:.9;pointer-events:none;}
.parade span{display:inline-block;font-size:1.7rem;letter-spacing:20px;padding-right:20px;animation:march 26s linear infinite;filter:drop-shadow(2px 3px 0 #000);}
@keyframes march{from{transform:translateX(0);}to{transform:translateX(-100%);}}
.title-foot{margin-top:18px;color:var(--dim);font-size:.72rem;letter-spacing:.08em;}

/* ===== bars & buttons ===== */
.bar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
.bar .mid{color:var(--gold);font-size:.85rem;font-weight:bold;text-align:center;flex:1;}
.bar .sp{width:76px;}
.icon-btn{
  font-family:inherit;background:var(--win);color:var(--frame);border:2px solid var(--frame);
  border-radius:8px;padding:5px 13px;font-size:.82rem;cursor:pointer;
}
.icon-btn:hover,.icon-btn:focus-visible{color:var(--gold);border-color:var(--gold);outline:none;}
.next-btn{
  font-family:inherit;display:inline-block;font-size:1rem;color:#1a1408;cursor:pointer;
  background:var(--gold);border:3px solid #fff;border-radius:10px;padding:10px 34px;font-weight:bold;
  box-shadow:0 4px 0 #8a6a10;
}
.next-btn:hover,.next-btn:focus-visible{transform:translateY(-2px);outline:none;}
.next-btn:focus-visible{outline:3px solid var(--cyan);outline-offset:3px;}
.next-btn:active{transform:translateY(2px);box-shadow:none;}
.off{color:#333a5e;text-shadow:none;}

/* ===== journey trail ===== */
.trail{display:flex;gap:7px;justify-content:center;align-items:center;margin:0 0 12px;flex-wrap:wrap;}
.tnode{font-size:1.3rem;line-height:1;filter:drop-shadow(1px 2px 0 #000);}
.tnode.done{opacity:.32;filter:grayscale(1) drop-shadow(1px 2px 0 #000);}
.tnode.now{transform:scale(1.28);animation:hover 1.6s ease-in-out infinite;text-shadow:0 0 14px var(--gold);}
.tnode.todo{opacity:.3;}
.tsep{color:#333a5e;font-size:.7rem;}

/* ===== chapter intro ===== */
.chapter-intro{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:#000000d9;z-index:70;pointer-events:none;
  animation:chfade 1.7s steps(12) forwards;
}
.chapter-intro .ch{color:var(--gold);font-size:1.05rem;letter-spacing:.5em;padding-left:.5em;}
.chapter-intro .tt{color:#fff;font-size:1.9rem;font-weight:bold;letter-spacing:.14em;text-shadow:2px 2px 0 #000,0 0 24px #7dd8ff33;}
.chapter-intro .bs{color:var(--dim);font-size:.85rem;margin-top:4px;}
@keyframes chfade{0%{opacity:0;}15%{opacity:1;}75%{opacity:1;}100%{opacity:0;}}

/* ===== battle ===== */
#battle-wrap.shake{animation:shake .4s steps(8);}
@keyframes shake{
  0%,100%{transform:none;}20%{transform:translate(-9px,3px);}40%{transform:translate(8px,-4px);}
  60%{transform:translate(-6px,-3px);}80%{transform:translate(5px,3px);}
}
.foe-win{position:relative;text-align:center;padding:14px 16px 12px;overflow:hidden;}
.foe-name{font-size:1rem;font-weight:bold;color:#fff;letter-spacing:.1em;}
.foe-name small{color:var(--dim);font-size:.68rem;letter-spacing:.14em;display:block;font-weight:normal;}
.foe-state{font-size:.75rem;color:var(--foe);height:1.2em;font-weight:bold;}
.foe-sprite{
  font-size:clamp(3.2rem,12vw,4.6rem);line-height:1.15;display:inline-block;margin:6px 0 4px;
  filter:drop-shadow(4px 5px 0 #000);
  animation:hover 2.4s ease-in-out infinite;
}
@keyframes hover{50%{transform:translateY(-7px);}}
.foe-sprite.angry{animation:angry .5s ease-in-out infinite;filter:drop-shadow(4px 5px 0 #000) drop-shadow(0 0 14px #ff5d7abb)!important;}
@keyframes angry{25%{transform:translate(-3px,-4px);}75%{transform:translate(3px,-2px);}}
.foe-sprite.hit{animation:foehit .45s steps(6);}
@keyframes foehit{
  0%{transform:translateX(0);filter:drop-shadow(4px 5px 0 #000) brightness(3);}
  25%{transform:translateX(-13px);}50%{transform:translateX(11px);filter:drop-shadow(4px 5px 0 #000) brightness(2.4);}
  75%{transform:translateX(-7px);}100%{transform:none;}
}
.foe-sprite.dead{animation:foedead 1.2s steps(10) forwards;}
@keyframes foedead{to{transform:translateY(26px) scaleY(.1);opacity:0;filter:brightness(4) blur(3px);}}
.hpwrap{max-width:360px;margin:2px auto 0;}
.hplabel{display:flex;justify-content:space-between;font-size:.7rem;color:var(--dim);}
.hpbar{height:15px;border:2px solid var(--frame);border-radius:8px;background:#1a1030;overflow:hidden;}
.hpbar>i{display:block;height:100%;background:linear-gradient(#ff8ba0,var(--foe));width:100%;transition:width .5s steps(12);}
.atk-banner{
  position:absolute;left:0;right:0;top:42%;font-size:1.15rem;font-weight:bold;color:#fff;
  text-shadow:2px 2px 0 #000,0 0 14px #ff5d7a;pointer-events:none;
  animation:atkfly .9s steps(12) forwards;
}
@keyframes atkfly{0%{transform:translateX(60%);opacity:0;}20%{transform:translateX(0);opacity:1;}80%{transform:translateX(-4%);opacity:1;}100%{transform:translateX(-60%);opacity:0;}}
.dmg{
  position:absolute;left:50%;top:30%;font-size:2.1rem;font-weight:bold;color:#fff;
  text-shadow:2px 2px 0 #000,0 0 12px #ff5d7a;pointer-events:none;font-variant-numeric:tabular-nums;
  animation:dmgpop 1s steps(10) forwards;white-space:nowrap;
}
.dmg.crit{color:var(--gold);font-size:2.7rem;text-shadow:2px 2px 0 #000,0 0 18px #ffcf4d;}
@keyframes dmgpop{0%{transform:translate(-50%,0) scale(.4);opacity:0;}15%{transform:translate(-50%,-14px) scale(1.25);opacity:1;}
  60%{transform:translate(-50%,-34px) scale(1);opacity:1;}100%{transform:translate(-50%,-58px) scale(.9);opacity:0;}}
.crit-flash{position:fixed;inset:0;background:#fff;z-index:50;pointer-events:none;animation:cflash .28s steps(3) forwards;}
@keyframes cflash{from{opacity:.85;}to{opacity:0;}}
.toast{
  position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:55;pointer-events:none;
  background:var(--win);border:3px solid var(--gold);border-radius:10px;padding:8px 22px;
  color:var(--gold);font-weight:bold;font-size:1rem;box-shadow:0 6px 20px #000a;
  animation:toastpop 1.6s steps(12) forwards;white-space:nowrap;
}
@keyframes toastpop{0%{transform:translate(-50%,-16px);opacity:0;}15%{transform:translate(-50%,0);opacity:1;}80%{opacity:1;}100%{transform:translate(-50%,-10px);opacity:0;}}

.pstrip{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px;font-size:.9rem;flex-wrap:wrap;}
.pstrip .hearts{letter-spacing:3px;font-size:1.05rem;text-shadow:1px 1px 0 #000;}
.pstrip .hearts small{color:var(--dim);font-size:.7rem;letter-spacing:0;margin-right:4px;}
.combo{color:var(--cyan);font-weight:bold;}
.combo b{color:var(--gold);font-size:1.1rem;}
.combo .fv{color:#ff9de2;animation:blink .5s steps(2) infinite;}
.score{color:var(--gold);font-variant-numeric:tabular-nums;font-weight:bold;}

.qwin{margin-top:12px;position:relative;}
.qwin.fever{animation:feverglow 1s linear infinite;}
@keyframes feverglow{0%{border-color:var(--gold);}33%{border-color:#ff9de2;}66%{border-color:var(--cyan);}100%{border-color:var(--gold);}}
.qtext{font-size:1.13rem;line-height:1.9;min-height:3.8em;cursor:pointer;font-weight:600;}

.choices{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.choice{
  font-family:inherit;font-size:1.02rem;color:var(--frame);cursor:pointer;text-align:left;line-height:1.6;
  background:var(--win);border:3px solid var(--frame);border-radius:12px;padding:11px 14px 11px 52px;
  box-shadow:inset 0 0 0 3px #ffffff1c,0 3px 0 #000;position:relative;transition:transform .05s;
}
.choice .key{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;line-height:24px;text-align:center;border:2px solid var(--dim);border-radius:7px;
  font-size:.85rem;color:var(--dim);font-weight:bold;
}
.choice:hover:not(:disabled),.choice:focus-visible{color:var(--gold);border-color:var(--gold);outline:none;transform:translateY(-2px);}
.choice:hover:not(:disabled) .key,.choice:focus-visible .key{color:var(--gold);border-color:var(--gold);}
.choice:disabled{cursor:default;}
.choice.right{border-color:var(--hp);color:var(--hp);box-shadow:inset 0 0 0 3px #4ade8033,0 3px 0 #000;}
.choice.right .key{color:var(--hp);border-color:var(--hp);}
.choice.wrongpick{border-color:var(--foe);color:var(--foe);animation:wobble .35s steps(6);}
.choice.wrongpick .key{color:var(--foe);border-color:var(--foe);}
.choice.faded{opacity:.28;}
@keyframes wobble{25%{transform:translateX(-6px);}50%{transform:translateX(5px);}75%{transform:translateX(-3px);}}

.explain{margin-top:12px;display:none;}
.explain.on{display:block;}
.explain.good{border-color:var(--hp);}
.explain.bad{border-color:var(--foe);}
.explain .tag{font-size:.95rem;font-weight:bold;letter-spacing:.1em;}
.explain.good .tag{color:var(--hp);}
.explain.bad .tag{color:var(--foe);}
.explain p{font-size:.95rem;margin-top:6px;line-height:1.8;}
.explain .foe-say{color:var(--foe);font-size:.85rem;margin-top:6px;}
.explain .center{margin-top:12px;}
.kbd-hint{margin-top:10px;color:var(--dim);font-size:.72rem;text-align:center;}
@media(max-width:600px){.kbd-hint{display:none;}}

/* ===== result ===== */
.result-box{text-align:center;padding:30px 20px;}
.stamp{
  display:inline-block;transform:rotate(-7deg);border:4px solid var(--gold);color:var(--gold);
  padding:0 22px;font-size:2.4rem;font-weight:bold;border-radius:10px;letter-spacing:.1em;
  text-shadow:2px 2px 0 #000;margin-bottom:8px;
  animation:stampin .35s cubic-bezier(.2,2.4,.5,1) both;
}
@keyframes stampin{from{transform:rotate(-7deg) scale(2.6);opacity:0;}to{transform:rotate(-7deg) scale(1);opacity:1;}}
.stamp.rA{border-color:var(--cyan);color:var(--cyan);}
.stamp.rB{border-color:var(--frame);color:var(--frame);}
.result-title{font-size:1.65rem;letter-spacing:.2em;color:var(--gold);text-shadow:2px 2px 0 #000,0 0 22px #ffcf4d55;}
.result-title.lose{color:var(--foe);text-shadow:2px 2px 0 #000,0 0 22px #ff5d7a55;}
.result-stars{font-size:2.2rem;letter-spacing:8px;margin:10px 0 4px;color:var(--gold);text-shadow:2px 2px 0 #000;}
.defeat-quote{color:var(--cyan);font-size:.95rem;margin:14px auto;max-width:32em;line-height:2;}
.result-score{font-size:1.1rem;color:#fff;font-variant-numeric:tabular-nums;}
.result-score b{color:var(--gold);font-size:1.55rem;}
.trivia{margin-top:18px;color:var(--dim);font-size:.8rem;line-height:1.9;max-width:34em;margin-left:auto;margin-right:auto;
  border-top:1px dashed #333a5e;padding-top:12px;}
.trivia b{color:var(--cyan);}
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap;align-items:center;}
.ending-parade{font-size:1.6rem;letter-spacing:10px;margin:10px 0 2px;filter:drop-shadow(2px 3px 0 #000);}

/* ===== overlay / tutorial ===== */
.overlay{position:fixed;inset:0;background:#000000c0;z-index:60;display:flex;align-items:center;justify-content:center;padding:16px;}
.overlay[hidden]{display:none;}
.tut-box{max-width:460px;width:100%;}
.tut-box h3{color:var(--gold);letter-spacing:.2em;font-size:1.15rem;text-align:center;margin-bottom:12px;}
.tut-box ol{list-style:none;display:flex;flex-direction:column;gap:12px;font-size:.92rem;line-height:1.8;}
.tut-box li{padding-left:2.4em;position:relative;}
.tut-box li .ico{position:absolute;left:0;top:0;font-size:1.4rem;filter:drop-shadow(1px 2px 0 #000);}
.tut-box .center{text-align:center;margin-top:18px;}

.center{text-align:center;}
.mt12{margin-top:12px;}
.small-dim{color:var(--dim);font-size:.76rem;}

/* タッチ端末: :hoverの固着を無効化(タップ後に金色が残る問題) */
@media(hover:none){
  .mode-btn:hover{color:var(--frame);transform:none;border-color:var(--frame);}
  .mode-btn:hover::before{content:none;}
  .icon-btn:hover{color:var(--frame);border-color:var(--frame);}
  .next-btn:hover{transform:none;}
  .choice:hover:not(:disabled){color:var(--frame);border-color:var(--frame);transform:none;}
  .choice:hover:not(:disabled) .key{color:var(--dim);border-color:var(--dim);}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;}
  .crit-flash{display:none;}
  .chapter-intro{display:none;}
}
</style>

<div id="sky"></div>
<div id="app">

  <!-- ===== TITLE ===== -->
  <section class="screen on" id="scr-title">
    <p class="logo-eyebrow px">木曜4限 社会福祉原論A 完全対応</p>
    <h1 class="logo px">福祉<span class="q">クエスト</span></h1>
    <p class="logo-sub px">— 謎の大冒険 —</p>
    <p class="tagline">よくわからん戦いが、いま始まる。</p>
    <div class="modes">
      <button class="mode-btn" id="btn-story">🗡️ ぼうけんに出る<small id="story-sub"></small></button>
    </div>
    <div class="title-tools">
      <button class="icon-btn" id="btn-restart" hidden>↩ 第1章から旅をやり直す</button>
      <button class="icon-btn" id="btn-howto">❓ あそびかた</button>
    </div>
    <div class="records" id="records"></div>
    <div class="parade" aria-hidden="true"><span id="parade1"></span><span id="parade2"></span></div>
    <p class="title-foot" id="title-foot"></p>
    <p class="title-foot"><button class="icon-btn" id="btn-reset" style="font-size:.68rem;padding:2px 8px;">きろくを消す</button></p>
  </section>

  <!-- ===== BATTLE ===== -->
  <section class="screen" id="scr-battle">
    <div class="bar">
      <button class="icon-btn" id="btn-flee">◀ タイトル</button>
      <span class="mid" id="battle-stage-name"></span>
      <span class="sp"></span>
    </div>
    <div class="trail" id="trail" aria-hidden="true"></div>
    <div id="battle-wrap">
      <div class="win foe-win" id="foe-win">
        <div class="foe-name" id="foe-name"></div>
        <div class="foe-state" id="foe-state"></div>
        <div class="foe-sprite" id="foe-sprite"></div>
        <div class="hpwrap">
          <div class="hplabel"><span>てきのHP</span><span id="foe-hp-num" class="px"></span></div>
          <div class="hpbar"><i id="foe-hp"></i></div>
        </div>
      </div>
      <div class="pstrip">
        <span class="hearts" id="hearts"></span>
        <span class="combo" id="combo"></span>
        <span class="score px" id="battle-score"></span>
      </div>
      <div class="win qwin" id="qwin">
        <p class="qtext" id="qtext"></p>
      </div>
      <div class="choices" id="choices"></div>
      <div class="win explain" id="explain">
        <span class="tag" id="ex-tag"></span>
        <p id="ex-body"></p>
        <p class="foe-say" id="foe-say"></p>
        <div class="center"><button class="next-btn" id="btn-next">つづける ▶</button></div>
      </div>
      <p class="kbd-hint">⌨ キーボード:1〜4 で回答 / Enter で先へ / クリックで文字送りスキップ</p>
    </div>
  </section>

  <!-- ===== RESULT ===== -->
  <section class="screen" id="scr-result">
    <div class="win result-box">
      <div id="stamp-area"></div>
      <h2 class="result-title px" id="result-title"></h2>

  fleeArmed=false;$("#btn-flee").textContent="◀ タイトル";
  $("#battle-stage-name").textContent=`${chapterLabel(chIdx)} ${B.stage.title}`;
  $("#foe-name").innerHTML=`${esc(B.boss.name)}<small class="px">${esc(B.boss.kana||"")}</small>`;
  $("#foe-state").textContent="";
  const sp=$("#foe-sprite");
  sp.textContent=B.boss.icon;
  sp.classList.remove("dead","hit","angry");
  sp.style.filter=`drop-shadow(4px 5px 0 #000) drop-shadow(0 0 16px ${B.boss.glow}44)`;
  $("#explain").classList.remove("on","good","bad");
  $("#choices").innerHTML="";
  $("#qtext").textContent="";/* 前バトルの問題文の残留表示を防ぐ(特にreduced-motionで章イントロ非表示のとき) */
  $("#qwin").classList.remove("fever");
  renderTrail();
  updateHUD();
  show("scr-battle");
  /* chapter intro */
  const ci=document.createElement("div");
  ci.className="chapter-intro";
  ci.innerHTML=`<span class="ch px">${chapterLabel(chIdx)}</span><span class="tt">${esc(B.stage.title)}</span><span class="bs">VS ${esc(B.boss.name)}</span>`;
  document.body.appendChild(ci);
  setTimeout(()=>ci.remove(),1750);
  const myRun=B.chapter;
  B.introT=setTimeout(()=>{
    B.introT=null;
    if(B.over||B.chapter!==myRun)return;
    msgType(B.boss.intro,()=>{B.introT=setTimeout(()=>{B.introT=null;if(!B.over)nextQuestion();},350);});
  },900);
}
function leaveBattle(){
  if(B.autoT){clearTimeout(B.autoT);B.autoT=null;}
  if(B.introT){clearTimeout(B.introT);B.introT=null;}
  if(B.hitT){clearTimeout(B.hitT);B.hitT=null;}
  if(B.resultT){clearTimeout(B.resultT);B.resultT=null;}
  if(typeTimer){clearInterval(typeTimer);typeTimer=null;}
  B.over=true;
}
let fleeArmed=false;
$("#btn-flee").addEventListener("click",()=>{
  if(B.over)return;/* 勝敗確定後は無効。とどめ直後の離脱でvictory予約が消え章クリアが失われるのを防ぐ */
  if(!fleeArmed){
    fleeArmed=true;$("#btn-flee").textContent="本当にやめる?";
    setTimeout(()=>{fleeArmed=false;if($("#scr-battle").classList.contains("on"))$("#btn-flee").textContent="◀ タイトル";},2500);
    return;
  }
  fleeArmed=false;$("#btn-flee").textContent="◀ タイトル";
  leaveBattle();renderTitle();show("scr-title");
});

/* ---------- HUD ---------- */
function updateHUD(){
  $("#hearts").innerHTML=`<small>ライフ</small>`+"❤️".repeat(B.hearts)+"🤍".repeat(Math.max(0,3-B.hearts));
  const fever=B.combo>=5;
  $("#combo").innerHTML=B.combo>1
    ?`COMBO <b>×${B.combo}</b>${fever?' <span class="fv">FEVER!!</span>':B.combo>=3?" 🔥":""}`
    :`COMBO —`;
  $("#battle-score").textContent=`SCORE ${B.score.toLocaleString()}`;
  const r=B.bossMax?Math.max(0,B.bossHP)/B.bossMax:0;
  $("#foe-hp").style.width=(r*100)+"%";
  $("#foe-hp-num").textContent=`${Math.max(0,B.bossHP)} / ${B.bossMax}`;
  if(!B.angry&&B.bossHP>0&&r<.3){
    B.angry=true;
    $("#foe-sprite").classList.add("angry");
    $("#foe-state").textContent="!! 怒りに燃えている !!";
  }
}

/* ---------- typewriter ---------- */
let typeTimer=null;
function msgType(text,done){
  if(typeTimer){clearInterval(typeTimer);typeTimer=null;}
  const el=$("#qtext");el.textContent="";let i=0;
  const full=text;
  typeTimer=setInterval(()=>{
    i++;el.textContent=full.slice(0,i);
    if(i>=full.length){clearInterval(typeTimer);typeTimer=null;if(done)done();}
  },17);
  /* ウィンドウ全体タップで文字送りスキップ(スマホでも押しやすく) */
  $("#qwin").onclick=()=>{if(typeTimer){clearInterval(typeTimer);typeTimer=null;el.textContent=full;if(done)done();}};
}

/* ---------- question flow ---------- */
function nextQuestion(){
  if(B.over)return;
  if(B.autoT){clearTimeout(B.autoT);B.autoT=null;}
  if(B.qi>=B.queue.length){
    /* 全問出題済み。最後が正解(combo>0)またはHP0なら戦い抜いた=討伐成立。
       最後が誤答でボスがHPを残していたら、倒しきれず=敗北とする。 */
    B.over=true;
    $("#btn-next").style.display="none";/* 勝敗確定の待ち時間に「すぐ次へ」を押させない */
    if(B.combo>0||B.bossHP<=0){B.bossHP=0;updateHUD();B.autoT=setTimeout(victory,400);}
    else{updateHUD();B.autoT=setTimeout(gameOver,400);}
    return;
  }
  const q=B.queue[B.qi];B.qi++;B.asked++;
  B.current=q;
  const correct=q[1][0];
  const opts=shuffle(q[1]);
  B.correctIdx=opts.indexOf(correct);
  $("#qwin").classList.toggle("fever",B.combo>=5);
  $("#explain").classList.remove("on","good","bad");
  const box=$("#choices");box.innerHTML="";
  const KEYS=["1","2","3","4"];
  opts.forEach((c,idx)=>{
    const b=document.createElement("button");
    b.className="choice";b.disabled=true;
    b.innerHTML=`<span class="key px">${KEYS[idx]}</span>${esc(c)}`;
    b.addEventListener("click",()=>onAnswer(idx));
    box.appendChild(b);
  });
  B.locked=true;
  msgType(q[0],()=>{
    if(B.over)return;
    $$(".choice").forEach(b=>b.disabled=false);
    B.locked=false;
  });
}
function onAnswer(idx){
  if(B.locked||B.over)return;
  B.locked=true;
  const btns=$$(".choice");
  btns.forEach(b=>b.disabled=true);
  const right=idx===B.correctIdx;
  btns.forEach((b,i)=>{
    if(i===B.correctIdx)b.classList.add("right");
    else if(i===idx)b.classList.add("wrongpick");
    else b.classList.add("faded");
  });
  const q=B.current;
  if(right){
    B.combo++;B.maxCombo=Math.max(B.maxCombo,B.combo);
    const wasFeverStart=B.combo===5;
    const fever=B.combo>=5;
    const crit=B.combo>=3;
    let dmg=70+Math.min(B.combo,5)*12;
    if(crit)dmg=Math.round(dmg*1.4);
    if(fever)dmg=Math.round(dmg*1.5);
    B.score+=dmg;
    if(wasFeverStart)toast("🌈 FEVER!! ダメージ1.5倍!");
    if(crit){const f=document.createElement("div");f.className="crit-flash";document.body.appendChild(f);setTimeout(()=>f.remove(),320);}
    hitBoss(dmg,crit,fever);
    updateHUD();
    if(B.bossHP<=0){
      B.over=true;
      showExplain(true,q,"finish");
      B.autoT=setTimeout(victory,1300);
      return;
    }
    showExplain(true,q,null);
    /* 解説の長さに応じて読み時間を確保(1.5秒+55ms/字、最大6秒) */
    const wait=Math.min(6000,1500+q[2].length*55);
    B.autoT=setTimeout(()=>{B.autoT=null;if(!B.over){B.locked=false;nextQuestion();}},wait);
  }else{
    B.combo=0;
    $("#qwin").classList.remove("fever");
    const atk=pick(B.boss.attacks);
    const banner=document.createElement("div");
    banner.className="atk-banner";banner.textContent=`💢 ${atk}!!`;
    $("#foe-win").appendChild(banner);
    setTimeout(()=>banner.remove(),950);
    const hitRun=B.chapter;
    B.hitT=setTimeout(()=>{
      B.hitT=null;
      if(B.over||B.chapter!==hitRun)return;
      $("#battle-wrap").classList.add("shake");
      setTimeout(()=>$("#battle-wrap").classList.remove("shake"),450);
      B.hearts--;updateHUD();
      showExplain(false,q,atk);
      if(B.hearts<=0)$("#btn-next").textContent="力尽きた… ▶";
      else $("#btn-next").textContent="つづける ▶";
    },550);
  }
}
function showExplain(good,q,finishOrAtk){
  const ex=$("#explain");
  ex.classList.remove("good","bad");
  ex.classList.add("on",good?"good":"bad");
  if(good){
    $("#ex-tag").textContent=finishOrAtk==="finish"?"⭕ せいかい! とどめの一撃!!":"⭕ せいかい!";
    $("#ex-body").innerHTML=esc(q[2]);
    $("#foe-say").textContent="";
    $("#btn-next").textContent="すぐ次へ ▶";
    $("#btn-next").style.display=finishOrAtk==="finish"?"none":"";
  }else{
    $("#ex-tag").textContent="❌ ミス!";
    $("#ex-body").innerHTML=`正解は「<b style="color:var(--hp)">${esc(q[1][0])}</b>」。${esc(q[2])}`;
    $("#foe-say").textContent=`${B.boss.name}の ${finishOrAtk}! 手痛い反撃を受けた!`;
    $("#btn-next").style.display="";
  }
  ex.scrollIntoView({behavior:"smooth",block:"nearest"});
}
$("#btn-next").addEventListener("click",()=>{
  const wasOn=$("#explain").classList.contains("on");
  if(!wasOn||B.over)return;/* 二重発火ガード。B.over時に先にautoTを消すと予約済みのvictory/gameOverが死んで進行不能になるため、ガードを最初に判定する */
  if(B.autoT){clearTimeout(B.autoT);B.autoT=null;}
  $("#explain").classList.remove("on");
  if(B.hearts<=0){gameOver();return;}
  B.locked=false;nextQuestion();
});
function hitBoss(dmg,crit,fever){
  const sp=$("#foe-sprite");
  sp.classList.remove("hit");void sp.offsetWidth;sp.classList.add("hit");
  B.bossHP-=dmg;
  const d=document.createElement("div");
  d.className="dmg"+(crit?" crit":"");
  d.textContent=(fever?"FEVER ":crit?"会心! ":"")+dmg;
  $("#foe-win").appendChild(d);
  setTimeout(()=>d.remove(),1050);
}

/* ---------- victory / gameover ---------- */
function victory(){
  if(B.autoT){clearTimeout(B.autoT);B.autoT=null;}
  const sp=$("#foe-sprite");sp.classList.remove("angry");sp.classList.add("dead");
  const stars=B.hearts>=3?3:B.hearts===2?2:1;
  const rank=stars===3?"S":stars===2?"A":"B";
  const bonus=stars*300+B.hearts*100;
  B.score+=bonus;
  save.stars[B.stage.id]=Math.max(save.stars[B.stage.id]||0,stars);
  save.best[B.stage.id]=Math.max(save.best[B.stage.id]||0,B.score);
  save.hiscore=Math.max(save.hiscore,B.score);
  save.progress=Math.max(save.progress,B.chapter+1);
  persist();
  const isEnding=B.isFinal;
  B.resultT=setTimeout(()=>{
    B.resultT=null;
    if(!$("#scr-battle").classList.contains("on"))return;
    $("#stamp-area").innerHTML=`<span class="stamp px ${rank==="A"?"rA":rank==="B"?"rB":""}">RANK ${rank}</span>`;
    $("#result-title").classList.remove("lose");
    $("#result-stars").innerHTML="★".repeat(stars)+"<span class='off'>"+"★".repeat(3-stars)+"</span>";
    $("#trivia").innerHTML=`<b>📖 まめちしき:</b>${esc(pick(TRIVIA))}`;
    const btns=$("#result-btns");btns.innerHTML="";
    if(isEnding){
      $("#result-title").textContent="〜 エンディング 〜";
      $("#defeat-quote").innerHTML=`${esc(B.boss.defeat)}<br><br>`+
        `<span class="ending-parade">${paradeStr}</span><br>`+
        `全12章、制覇おめでとう!<br>称号「<b style="color:var(--gold)">${esc(rankName(RANKS,totalStars()))}</b>」 ★${totalStars()}/${CHAPTERS.length*3}<br>`+
        `キミはもう、福祉を自分の言葉で語れる。`;
      $("#result-score").innerHTML=`SCORE <b>${B.score.toLocaleString()}</b> <span style="font-size:.75rem;color:var(--dim)">(クリア+${bonus} / 最大コンボ×${B.maxCombo})</span>`;
      addBtn(btns,"タイトルへ",()=>{renderTitle();show("scr-title");},true);
      addBtn(btns,"終章にもう一度挑む",()=>startBattle(B.chapter));
    }else{
      $("#result-title").textContent="ボス討伐!!";
      $("#defeat-quote").textContent=B.boss.defeat;
      $("#result-score").innerHTML=`SCORE <b>${B.score.toLocaleString()}</b> <span style="font-size:.75rem;color:var(--dim)">(クリア+${bonus} / 最大コンボ×${B.maxCombo})</span>`
        +(stars<3?`<br><span style="font-size:.72rem;color:var(--dim)">💡 ノーダメージで倒すと RANK S(★3)!</span>`:"");
      const nx=B.chapter+1;
      addBtn(btns,`つぎの地へ ▶ ${chapterLabel(nx)}`,()=>startBattle(nx),true);
      addBtn(btns,"この章をもう一度",()=>startBattle(B.chapter));
      addBtn(btns,"タイトルへ",()=>{renderTitle();show("scr-title");});
    }
    show("scr-result");
  },1300);
}
function gameOver(){
  B.over=true;
  if(B.autoT){clearTimeout(B.autoT);B.autoT=null;}
  $("#stamp-area").innerHTML="";
  $("#result-title").textContent="力尽きた…";
  $("#result-title").classList.add("lose");
  $("#result-stars").textContent="💤";
  $("#defeat-quote").textContent=`${B.boss.name}「フハハ…出直してくるがよい。復習こそ最強の武器だぞ?」`;
  $("#result-score").innerHTML=`SCORE <b>${B.score.toLocaleString()}</b>`;
  $("#trivia").innerHTML=`<b>📖 まめちしき:</b>${esc(pick(TRIVIA))}`;
  const btns=$("#result-btns");btns.innerHTML="";
  addBtn(btns,"リベンジ!",()=>startBattle(B.chapter),true);
  addBtn(btns,"タイトルへ",()=>{renderTitle();show("scr-title");});
  show("scr-result");
}
function addBtn(parent,label,fn,primary){
  const b=document.createElement("button");
  b.className=primary?"next-btn":"icon-btn";
  b.textContent=label;
  b.addEventListener("click",fn);
  parent.appendChild(b);
}

/* ---------- keyboard ---------- */
document.addEventListener("keydown",e=>{
  if(e.repeat)return;/* 長押しリピートでリザルト画面を飛ばさない */
  /* フォーカス中の有効なボタンはネイティブのEnter/Space動作に任せる(横取りすると別のボタンが押される) */
  if((e.key==="Enter"||e.key===" ")&&document.activeElement&&document.activeElement.tagName==="BUTTON"&&!document.activeElement.disabled)return;
  if($("#scr-result").classList.contains("on")&&e.key==="Enter"){
    const b=$("#result-btns .next-btn");
    if(b){e.preventDefault();b.click();}
    return;
  }
  if(!$("#scr-battle").classList.contains("on"))return;
  if($("#tut").hidden===false)return;
  if(e.key>="1"&&e.key<="4"){
    const b=$$(".choice")[+e.key-1];
    if(b&&!b.disabled){e.preventDefault();b.click();}
  }else if(e.key==="Enter"||e.key===" "){
    e.preventDefault();
    if($("#explain").classList.contains("on")&&$("#btn-next").style.display!=="none"){$("#btn-next").click();}
    else if(typeTimer){$("#qtext").click();}
  }
});

/* boot(セルフテストのstartBattleより先に実行しないと、末尾bootが画面をタイトルへ戻し、
   v2.0のresultTガードがリザルト表示を抑止して selftest が TIMEOUT する) */
show("scr-title");

/* ---------- SELF TEST (?selftest) ---------- */
if(location.search.indexOf("selftest")>-1){
  const LOG=[];
  persist=function(){};/* セルフテストが実プレイヤーのlocalStorageセーブを上書きしないよう無効化 */
  window.addEventListener("error",e=>LOG.push("ERR:"+e.message));
  const finish=()=>{
    const fails=LOG.filter(l=>/^(ERR|EX|QBAD|QLEN|DUPQ|TIMEOUT|STUCK)/.test(l));
    document.title="ST:"+(fails.length===0?"OK":"FAIL")+"|"+LOG.join("|").slice(0,400);
    const d=document.createElement("pre");d.id="selftest-log";d.textContent=LOG.join("\n")||"CLEAN";
    d.style.cssText="position:fixed;bottom:0;left:0;z-index:99;background:#000;color:#0f0;font-size:10px;max-height:120px;overflow:auto;";
    document.body.appendChild(d);
  };
  try{
    STAGES.forEach(s=>{
      if(s.q.length!==8)LOG.push("QLEN:"+s.id);
      s.q.forEach((q,qi)=>{
        if(!q[0]||q[1].length!==4||!q[2])LOG.push("QBAD:"+s.id+":"+qi);
        if(new Set(q[1]).size!==4)LOG.push("DUPQ:"+s.id+":"+qi);
      });
    });
    LOG.push("DATA:"+QT+"q/"+CHAPTERS.length+"ch");
    save.tut=1;save.progress=0;
    startBattle(0);
    let steps=0,wrongDone=false,cleared=0;
    const iv=setInterval(()=>{
      steps++;
      if(steps>30000){LOG.push("TIMEOUT:ch"+B.chapter);clearInterval(iv);finish();return;}
      if($("#scr-result").classList.contains("on")){
        const t=$("#result-title").textContent;
        if(t.indexOf("エンディング")>-1){
          LOG.push("ENDING:progress="+save.progress+":stars="+totalStars()+":cleared="+cleared);
          clearInterval(iv);finish();return;
        }
        if(t.indexOf("力尽きた")>-1){LOG.push("STUCK:gameover-ch"+B.chapter);clearInterval(iv);finish();return;}
        const nb=$("#result-btns .next-btn");
        if(nb){cleared++;nb.click();}
        return;
      }
      const exOn=$("#explain").classList.contains("on");
      if(exOn&&B.locked&&$("#btn-next").style.display!=="none"&&B.combo===0&&B.hearts>0){$("#btn-next").click();return;}
      if(!B.locked&&!B.over){
        if(!wrongDone&&B.chapter===0&&B.asked>=3){
          const btns=$$(".choice");
          const wrongIdx=btns.findIndex((b,i)=>i!==B.correctIdx&&!b.disabled);
          if(wrongIdx>=0){wrongDone=true;LOG.push("WRONGCLICK");btns[wrongIdx].click();return;}
        }
        const cb=$$(".choice")[B.correctIdx];
        if(cb&&!cb.disabled){cb.click();return;}
      }
      if(typeTimer)$("#qtext").click();
    },60);
  }catch(e){LOG.push("EX:"+e.message);finish();}
}

</script>

if("serviceWorker" in navigator&&location.protocol==="https:"){navigator.serviceWorker.register("./sw.js").catch(function(){});}
(function(){var f=document.getElementById("title-foot");if(f)f.textContent+=" / 📲 「ホーム画面に追加」でアプリになります";})();
